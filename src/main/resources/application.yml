server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/user-db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer # kafka 로 부터 받아온 메시지(key)를 String 으로 역직렬화
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer # kafka 로 부터 받아온 메시지(value)를 String 으로 역직렬화
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

client:
  point-service:
    url: http://localhost:8082

jwt:
  secret: jsocde-secret-1234-1234-1234-1234
